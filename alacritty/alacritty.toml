# ======================
# Window / Transparency
# ======================
[window]
opacity = 0.85          # 1.0 = solid, 0.0 = invisible
blur = true             # Works on macOS + some Wayland compositors
decorations = "None"    # Optional: borderless

padding.x = 10
padding.y = 10

# ======================
# Font
# ======================
[font]
size = 12.5

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

# ======================
# Cursor
# ======================
[cursor]
style = { shape = "Beam", blinking = "On" }

# ======================
# Catppuccin Mocha Colors
# ======================
[colors.primary]
background = "#1E1E2E" # Base
foreground = "#CDD6F4" # Text

[colors.cursor]
text = "#1E1E2E"
cursor = "#F5E0DC"

[colors.selection]
text = "#1E1E2E"
background = "#F5E0DC"

[colors.normal]
black   = "#45475A"
red     = "#F38BA8"
green   = "#A6E3A1"
yellow  = "#F9E2AF"
blue    = "#89B4FA"
magenta = "#F5C2E7"
cyan    = "#94E2D5"
white   = "#BAC2DE"

[colors.bright]
black   = "#585B70"
red     = "#F38BA8"
green   = "#A6E3A1"
yellow  = "#F9E2AF"
blue    = "#89B4FA"
magenta = "#F5C2E7"
cyan    = "#94E2D5"
white   = "#A6ADC8"

[colors.footer_bar]
background = "#181825"
foreground = "#CDD6F4"
